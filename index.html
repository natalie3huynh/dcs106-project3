<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ocean Surface Temperature Explorer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="header">
    <h1>Ocean Surface Temperature Explorer</h1>
    <p>Sea Surface Temperature (SST) by ocean region — CMIP6 MIROC6 historical simulation, 1990–2014 average. Hover over an ocean region to see statistics.</p>
    <button id="toggle-btn">Show Δ Change</button>
  </div>

  <div id="map-container">
    <!-- canvas and svg are injected here by d3.js -->
    <div id="tooltip"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson@3/dist/topojson.min.js"></script>
  <script src="d3.js"></script>

</body>
</html>
